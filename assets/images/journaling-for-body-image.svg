<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep warm blush-neutral -->
  <rect width="1200" height="628" fill="#1e1618"/>

  <!-- Gentle radial warmth -->
  <radialGradient id="bodyGlow" cx="50%" cy="52%" r="50%">
    <stop offset="0%" stop-color="#281e20" stop-opacity="1"/>
    <stop offset="100%" stop-color="#1e1618" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#bodyGlow)"/>

  <!-- Abstract body-neutral motif: two soft organic shapes side by side — not human silhouettes, just paired organic forms suggesting presence without judgement -->
  <!-- Left form -->
  <ellipse cx="430" cy="314" rx="68" ry="110" fill="none" stroke="#c09090" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="430" cy="314" rx="44" ry="72" fill="#c09090" opacity="0.06"/>
  <!-- Right form -->
  <ellipse cx="560" cy="320" rx="52" ry="90" fill="none" stroke="#c09090" stroke-width="1.5" opacity="0.15"/>
  <ellipse cx="560" cy="320" rx="34" ry="58" fill="#c09090" opacity="0.05"/>

  <!-- Botanical — right side -->
  <g opacity="0.18" transform="translate(950,80)">
    <path d="M40,510 Q38,390 42,270 Q46,150 40,40" stroke="#d0a8a0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M41,160 Q82,140 92,112 Q66,132 41,152" fill="#d0a8a0" opacity="0.45"/>
    <path d="M42,280 Q4,260 -2,234 Q24,252 42,270" fill="#d0a8a0" opacity="0.38"/>
    <path d="M41,390 Q80,372 88,346 Q64,364 41,382" fill="#d0a8a0" opacity="0.35"/>
    <path d="M40,470 Q6,452 0,426 Q22,444 40,462" fill="#d0a8a0" opacity="0.32"/>
  </g>

  <!-- Left botanical -->
  <g opacity="0.14" transform="translate(155,100)">
    <path d="M30,480 Q28,370 32,260 Q36,150 30,40" stroke="#d0a8a0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M31,170 Q-4,152 -10,126 Q16,144 31,162" fill="#d0a8a0" opacity="0.4"/>
    <path d="M31,300 Q66,282 74,258 Q52,276 31,292" fill="#d0a8a0" opacity="0.35"/>
  </g>

  <!-- Text backdrop -->
  <rect x="0" y="218" width="1200" height="208" fill="#1e1618" opacity="0.6"/>

  <!-- Category -->
  <text x="600" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#c080a0" text-anchor="middle" letter-spacing="5">WELLBEING · MENTAL HEALTH</text>

  <!-- Title -->
  <text x="600" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="normal" fill="#f0e8ec" text-anchor="middle">Journaling for Body Image</text>

  <!-- Subtitle -->
  <text x="600" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#c080a0" text-anchor="middle" font-style="italic">Writing Towards Neutrality, Not Positivity</text>

  <!-- Divider -->
  <line x1="450" y1="396" x2="576" y2="396" stroke="#3a2028" stroke-width="0.8"/>
  <circle cx="600" cy="396" r="3.5" fill="#c080a0"/>
  <line x1="624" y1="396" x2="750" y2="396" stroke="#3a2028" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="440" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#201018" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
