<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep cool teal-slate -->
  <rect width="1200" height="628" fill="#111e24"/>

  <!-- Soft glow -->
  <radialGradient id="teenGlow" cx="50%" cy="52%" r="55%">
    <stop offset="0%" stop-color="#182830" stop-opacity="1"/>
    <stop offset="100%" stop-color="#111e24" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#teenGlow)"/>

  <!-- Open journal spread (centre-left) -->
  <g transform="translate(160,130)" opacity="0.22">
    <!-- Left page -->
    <rect x="0" y="0" width="200" height="280" rx="3" fill="#f0ece4" stroke="#c8b898" stroke-width="1"/>
    <!-- Right page -->
    <rect x="205" y="0" width="200" height="280" rx="3" fill="#f8f4ec" stroke="#c8b898" stroke-width="1"/>
    <!-- Spine shadow -->
    <rect x="196" y="0" width="9" height="280" fill="#8a8070" opacity="0.4"/>
    <!-- Lines on left page -->
    <line x1="20" y1="40" x2="185" y2="40" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="20" y1="60" x2="185" y2="60" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="20" y1="80" x2="185" y2="80" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="20" y1="100" x2="185" y2="100" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="20" y1="120" x2="185" y2="120" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="20" y1="140" x2="150" y2="140" stroke="#c8b898" stroke-width="0.8"/>
    <!-- Doodle on right page — small star and some lines -->
    <circle cx="280" cy="50" r="8" fill="none" stroke="#9ab8c8" stroke-width="1"/>
    <line x1="225" y1="90" x2="380" y2="90" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="225" y1="110" x2="380" y2="110" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="225" y1="130" x2="355" y2="130" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="225" y1="150" x2="380" y2="150" stroke="#c8b898" stroke-width="0.8"/>
    <line x1="225" y1="170" x2="340" y2="170" stroke="#c8b898" stroke-width="0.8"/>
  </g>

  <!-- Small scattered dots — stars or thoughts -->
  <g fill="#6ab8d0" opacity="0.3">
    <circle cx="840" cy="80" r="2"/>
    <circle cx="920" cy="130" r="1.5"/>
    <circle cx="980" cy="70" r="2.5"/>
    <circle cx="1060" cy="110" r="1.5"/>
    <circle cx="1100" cy="60" r="2"/>
    <circle cx="880" cy="180" r="1.5"/>
    <circle cx="1020" cy="160" r="2"/>
    <circle cx="780" cy="550" r="1.5"/>
    <circle cx="900" cy="540" r="2"/>
    <circle cx="1050" cy="560" r="1.5"/>
  </g>

  <!-- Text backdrop -->
  <rect x="0" y="215" width="1200" height="215" fill="#111e24" opacity="0.58"/>

  <!-- Category -->
  <text x="600" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#5aa8c0" text-anchor="middle" letter-spacing="5">MENTAL HEALTH · WELLBEING</text>

  <!-- Title -->
  <text x="600" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="normal" fill="#e4f4f8" text-anchor="middle">Journaling for Teenagers</text>

  <!-- Subtitle -->
  <text x="600" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#5aa8c0" text-anchor="middle" font-style="italic">A Guide for Teens and the Adults Who Care About Them</text>

  <!-- Divider -->
  <line x1="450" y1="396" x2="576" y2="396" stroke="#1a3040" stroke-width="0.8"/>
  <circle cx="600" cy="396" r="3.5" fill="#5aa8c0"/>
  <line x1="624" y1="396" x2="750" y2="396" stroke="#1a3040" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="440" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#112028" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
