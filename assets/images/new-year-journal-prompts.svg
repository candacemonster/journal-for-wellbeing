<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep near-black with cool green-blue undertone -->
  <rect width="1200" height="628" fill="#0e1a1c"/>

  <!-- Soft radial glow at midnight — centre horizon -->
  <radialGradient id="midnightGlow" cx="50%" cy="75%" r="55%">
    <stop offset="0%" stop-color="#1a3a3e" stop-opacity="1"/>
    <stop offset="100%" stop-color="#0e1a1c" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#midnightGlow)"/>

  <!-- Stars -->
  <circle cx="140" cy="48" r="1.5" fill="#e8f5f8" opacity="0.7"/>
  <circle cx="320" cy="82" r="1" fill="#e8f5f8" opacity="0.5"/>
  <circle cx="500" cy="40" r="1.5" fill="#e8f5f8" opacity="0.6"/>
  <circle cx="680" cy="70" r="1" fill="#e8f5f8" opacity="0.45"/>
  <circle cx="850" cy="38" r="1.5" fill="#e8f5f8" opacity="0.65"/>
  <circle cx="1010" cy="65" r="1" fill="#e8f5f8" opacity="0.5"/>
  <circle cx="1140" cy="48" r="1.5" fill="#e8f5f8" opacity="0.6"/>
  <circle cx="78" cy="130" r="1" fill="#e8f5f8" opacity="0.4"/>
  <circle cx="420" cy="148" r="1" fill="#e8f5f8" opacity="0.35"/>
  <circle cx="980" cy="128" r="1" fill="#e8f5f8" opacity="0.4"/>

  <!-- Midnight firework — left side, subtle arcs -->
  <g opacity="0.22" transform="translate(160,180)">
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#b8e0f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="52" y2="-32" stroke="#b8e0f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="60" y2="8" stroke="#b8e0f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="32" y2="52" stroke="#b8e0f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-32" y2="52" stroke="#b8e0f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-60" y2="8" stroke="#b8e0f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-52" y2="-32" stroke="#b8e0f0" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="0" cy="-60" r="2.5" fill="#b8e0f0" opacity="0.6"/>
    <circle cx="52" cy="-32" r="2" fill="#b8e0f0" opacity="0.5"/>
    <circle cx="60" cy="8" r="2" fill="#b8e0f0" opacity="0.5"/>
    <circle cx="32" cy="52" r="2.5" fill="#b8e0f0" opacity="0.6"/>
    <circle cx="-32" cy="52" r="2.5" fill="#b8e0f0" opacity="0.6"/>
    <circle cx="-60" cy="8" r="2" fill="#b8e0f0" opacity="0.5"/>
    <circle cx="-52" cy="-32" r="2" fill="#b8e0f0" opacity="0.5"/>
  </g>

  <!-- Midnight firework — right side -->
  <g opacity="0.18" transform="translate(1040,200)">
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#e0d0a8" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="44" y2="-25" stroke="#e0d0a8" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="50" y2="10" stroke="#e0d0a8" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="28" y2="44" stroke="#e0d0a8" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-28" y2="44" stroke="#e0d0a8" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-50" y2="10" stroke="#e0d0a8" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-44" y2="-25" stroke="#e0d0a8" stroke-width="1" stroke-linecap="round"/>
    <circle cx="0" cy="-50" r="2" fill="#e0d0a8" opacity="0.6"/>
    <circle cx="44" cy="-25" r="2" fill="#e0d0a8" opacity="0.5"/>
    <circle cx="-28" cy="44" r="2" fill="#e0d0a8" opacity="0.6"/>
  </g>

  <!-- Clock face — subtle, right of centre -->
  <g transform="translate(800,295)" opacity="0.12">
    <circle cx="0" cy="0" r="88" stroke="#8ac8d8" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="4" fill="#8ac8d8"/>
    <!-- Hour hand at midnight (12) -->
    <line x1="0" y1="0" x2="0" y2="-64" stroke="#8ac8d8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Minute hand at midnight (12) -->
    <line x1="0" y1="0" x2="0" y2="-76" stroke="#8ac8d8" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tick marks -->
    <line x1="0" y1="-82" x2="0" y2="-88" stroke="#8ac8d8" stroke-width="1.5"/>
    <line x1="0" y1="82" x2="0" y2="88" stroke="#8ac8d8" stroke-width="1"/>
    <line x1="82" y1="0" x2="88" y2="0" stroke="#8ac8d8" stroke-width="1"/>
    <line x1="-82" y1="0" x2="-88" y2="0" stroke="#8ac8d8" stroke-width="1"/>
    <line x1="71" y1="-41" x2="76" y2="-44" stroke="#8ac8d8" stroke-width="0.8"/>
    <line x1="41" y1="-71" x2="44" y2="-76" stroke="#8ac8d8" stroke-width="0.8"/>
    <line x1="-41" y1="-71" x2="-44" y2="-76" stroke="#8ac8d8" stroke-width="0.8"/>
    <line x1="-71" y1="-41" x2="-76" y2="-44" stroke="#8ac8d8" stroke-width="0.8"/>
  </g>

  <!-- Dark overlay for text area -->
  <rect x="0" y="195" width="1200" height="240" fill="#0e1a1c" opacity="0.6"/>

  <!-- Category -->
  <text x="600" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#70b8c8" text-anchor="middle" letter-spacing="5">PROMPTS · SEASONAL · REFLECTION</text>

  <!-- Title -->
  <text x="600" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="normal" fill="#e8f8f8" text-anchor="middle">New Year Journal Prompts</text>

  <!-- Subtitle -->
  <text x="600" y="352" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#70b8c8" text-anchor="middle" font-style="italic">Gentle Questions for the Turn of the Year</text>

  <!-- Divider -->
  <line x1="440" y1="380" x2="572" y2="380" stroke="#2a4a52" stroke-width="0.8"/>
  <circle cx="600" cy="380" r="3.5" fill="#70b8c8"/>
  <line x1="628" y1="380" x2="760" y2="380" stroke="#2a4a52" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="424" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#1e3840" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
