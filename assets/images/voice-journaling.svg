<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep navy-blue -->
  <rect width="1200" height="628" fill="#0e1420"/>

  <!-- Radial glow at centre -->
  <radialGradient id="voiceGlow" cx="50%" cy="52%" r="45%">
    <stop offset="0%" stop-color="#162030" stop-opacity="1"/>
    <stop offset="100%" stop-color="#0e1420" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#voiceGlow)"/>

  <!-- Sound waveform — centred bars of varying heights representing voice -->
  <!-- Each bar is a thin rounded rect, taller in the middle -->
  <g transform="translate(340, 230)" fill="#4a88c0" opacity="0.55">
    <!-- bar positions: x offset, then height pairs centred on y=100 -->
    <rect x="0"   y="60" width="10" height="80"  rx="4"/>
    <rect x="16"  y="40" width="10" height="120" rx="4"/>
    <rect x="32"  y="20" width="10" height="160" rx="4"/>
    <rect x="48"  y="10" width="10" height="180" rx="4"/>
    <rect x="64"  y="30" width="10" height="140" rx="4"/>
    <rect x="80"  y="50" width="10" height="100" rx="4"/>
    <rect x="96"  y="70" width="10" height="60"  rx="4"/>
    <rect x="112" y="55" width="10" height="90"  rx="4"/>
    <rect x="128" y="35" width="10" height="130" rx="4"/>
    <rect x="144" y="15" width="10" height="170" rx="4"/>
    <rect x="160" y="5"  width="10" height="190" rx="4"/>
    <rect x="176" y="15" width="10" height="170" rx="4"/>
    <rect x="192" y="35" width="10" height="130" rx="4"/>
    <rect x="208" y="50" width="10" height="100" rx="4"/>
    <rect x="224" y="65" width="10" height="70"  rx="4"/>
    <rect x="240" y="80" width="10" height="40"  rx="4"/>
    <rect x="256" y="70" width="10" height="60"  rx="4"/>
    <rect x="272" y="45" width="10" height="110" rx="4"/>
    <rect x="288" y="25" width="10" height="150" rx="4"/>
    <rect x="304" y="10" width="10" height="180" rx="4"/>
    <rect x="320" y="20" width="10" height="160" rx="4"/>
    <rect x="336" y="40" width="10" height="120" rx="4"/>
    <rect x="352" y="58" width="10" height="84"  rx="4"/>
    <rect x="368" y="70" width="10" height="60"  rx="4"/>
    <rect x="384" y="82" width="10" height="36"  rx="4"/>
    <rect x="400" y="76" width="10" height="48"  rx="4"/>
    <rect x="416" y="62" width="10" height="76"  rx="4"/>
    <rect x="432" y="44" width="10" height="112" rx="4"/>
    <rect x="448" y="28" width="10" height="144" rx="4"/>
    <rect x="464" y="50" width="10" height="100" rx="4"/>
    <rect x="480" y="66" width="10" height="68"  rx="4"/>
    <rect x="496" y="78" width="10" height="44"  rx="4"/>
  </g>

  <!-- Text backdrop -->
  <rect x="0" y="220" width="1200" height="200" fill="#0e1420" opacity="0.6"/>

  <!-- Category -->
  <text x="600" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#4a88c0" text-anchor="middle" letter-spacing="5">PRACTICE · WELLBEING</text>

  <!-- Title -->
  <text x="600" y="322" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="normal" fill="#e0ecf8" text-anchor="middle">Voice Journaling</text>

  <!-- Subtitle -->
  <text x="600" y="372" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#4a88c0" text-anchor="middle" font-style="italic">How to Journal Without Writing a Single Word</text>

  <!-- Divider -->
  <line x1="450" y1="400" x2="576" y2="400" stroke="#1a2c40" stroke-width="0.8"/>
  <circle cx="600" cy="400" r="3.5" fill="#4a88c0"/>
  <line x1="624" y1="400" x2="750" y2="400" stroke="#1a2c40" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="444" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#101a28" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
