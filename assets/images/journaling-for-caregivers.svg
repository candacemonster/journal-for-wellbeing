<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep muted teal-slate -->
  <rect width="1200" height="628" fill="#101e20"/>

  <!-- Radial warmth at centre -->
  <radialGradient id="careGlow" cx="50%" cy="52%" r="50%">
    <stop offset="0%" stop-color="#162828" stop-opacity="1"/>
    <stop offset="100%" stop-color="#101e20" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#careGlow)"/>

  <!-- Cup/vessel motif — centre left: a simple vessel shape being filled, suggesting tending to oneself -->
  <g transform="translate(340, 170)" opacity="0.2">
    <!-- Cup outline -->
    <path d="M60,220 Q20,220 10,180 L30,0 L130,0 L150,180 Q140,220 100,220 Z" fill="none" stroke="#70c8c0" stroke-width="2"/>
    <!-- Fill level (partial fill — not full, but present) -->
    <path d="M35,120 L128,120 L140,180 Q132,210 100,210 Q68,210 60,180 Z" fill="#70c8c0" opacity="0.15"/>
    <!-- Ripple on surface -->
    <path d="M50,118 Q82,108 118,118" fill="none" stroke="#70c8c0" stroke-width="1" opacity="0.5"/>
    <!-- Handle -->
    <path d="M150,60 Q190,60 190,100 Q190,140 150,140" fill="none" stroke="#70c8c0" stroke-width="1.5"/>
  </g>

  <!-- Botanical right side -->
  <g opacity="0.18" transform="translate(990,80)">
    <path d="M30,500 Q28,390 32,280 Q36,170 30,50" stroke="#70c8c0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M31,170 Q68,150 76,124 Q52,142 31,162" fill="#70c8c0" opacity="0.4"/>
    <path d="M32,290 Q-2,272 -8,248 Q18,264 32,280" fill="#70c8c0" opacity="0.35"/>
    <path d="M31,400 Q66,382 74,358 Q52,374 31,392" fill="#70c8c0" opacity="0.32"/>
    <path d="M30,478 Q-2,462 -6,438 Q18,454 30,470" fill="#70c8c0" opacity="0.28"/>
  </g>

  <!-- Small dots — scattered, like water drops or moments of care -->
  <g fill="#70c8c0" opacity="0.2">
    <circle cx="820" cy="120" r="2.5"/>
    <circle cx="860" cy="175" r="2"/>
    <circle cx="900" cy="130" r="3"/>
    <circle cx="935" cy="160" r="2"/>
    <circle cx="870" cy="85" r="1.5"/>
    <circle cx="200" cy="490" r="2"/>
    <circle cx="260" cy="540" r="2.5"/>
    <circle cx="320" cy="510" r="1.5"/>
  </g>

  <!-- Text backdrop -->
  <rect x="0" y="218" width="1200" height="210" fill="#101e20" opacity="0.6"/>

  <!-- Category -->
  <text x="600" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#50a8a0" text-anchor="middle" letter-spacing="5">WELLBEING · MENTAL HEALTH</text>

  <!-- Title -->
  <text x="600" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="normal" fill="#e0f4f2" text-anchor="middle">Journaling for Caregivers</text>

  <!-- Subtitle -->
  <text x="600" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#50a8a0" text-anchor="middle" font-style="italic">Writing for Yourself When You Give Everything to Others</text>

  <!-- Divider -->
  <line x1="450" y1="396" x2="576" y2="396" stroke="#183030" stroke-width="0.8"/>
  <circle cx="600" cy="396" r="3.5" fill="#50a8a0"/>
  <line x1="624" y1="396" x2="750" y2="396" stroke="#183030" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="440" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#0e1e20" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
