<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: warm golden sand -->
  <rect width="1200" height="628" fill="#f8f2e0"/>

  <!-- Rising sun / arc motif — confidence/growth -->
  <circle cx="600" cy="640" r="340" fill="none" stroke="#e8c860" stroke-width="1.5" opacity="0.3"/>
  <circle cx="600" cy="640" r="280" fill="none" stroke="#e8c860" stroke-width="1" opacity="0.25"/>
  <circle cx="600" cy="640" r="215" fill="none" stroke="#d4a830" stroke-width="1.2" opacity="0.3"/>
  <circle cx="600" cy="640" r="148" fill="none" stroke="#d4a830" stroke-width="1" opacity="0.4"/>
  <!-- Solid warm half-disc rising -->
  <path d="M300,628 A300,300 0 0 1 900,628 Z" fill="#f2d870" opacity="0.18"/>
  <path d="M380,628 A220,220 0 0 1 820,628 Z" fill="#f0cc50" opacity="0.15"/>
  <path d="M460,628 A140,140 0 0 1 740,628 Z" fill="#f0c840" opacity="0.18"/>
  <path d="M530,628 A70,70 0 0 1 670,628 Z" fill="#e8b820" opacity="0.25"/>

  <!-- Horizontal ground line -->
  <line x1="0" y1="628" x2="1200" y2="628" stroke="#d4a830" stroke-width="1" opacity="0.3"/>

  <!-- Simple ascending steps (left) representing growth -->
  <rect x="68" y="450" width="60" height="128" fill="#e8c860" opacity="0.3" rx="2"/>
  <rect x="68" y="390" width="60" height="70" fill="#e8c860" opacity="0.25" rx="2"/>
  <rect x="68" y="340" width="60" height="54" fill="#d4a830" opacity="0.2" rx="2"/>
  <rect x="68" y="300" width="60" height="40" fill="#c49020" opacity="0.18" rx="2"/>

  <!-- Content rect backdrop -->
  <rect x="160" y="155" width="880" height="250" rx="4" fill="#fff9f0" opacity="0.7"/>

  <!-- Category -->
  <text x="600" y="194" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#c49020" text-anchor="middle" letter-spacing="5">WELLBEING · SELF-COMPASSION</text>

  <!-- Title line 1 -->
  <text x="600" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="normal" fill="#2c2010" text-anchor="middle">Journaling for Confidence</text>
  <!-- Title line 2 -->
  <text x="600" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="normal" fill="#2c2010" text-anchor="middle">and Self-Esteem</text>

  <!-- Subtitle -->
  <text x="600" y="354" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#9a7820" text-anchor="middle" font-style="italic">Writing a Kinder Story About Yourself</text>

  <!-- Divider -->
  <line x1="456" y1="376" x2="580" y2="376" stroke="#d4a830" stroke-width="0.8"/>
  <circle cx="600" cy="376" r="3" fill="#d4a830"/>
  <line x1="620" y1="376" x2="744" y2="376" stroke="#d4a830" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="414" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#b09030" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
