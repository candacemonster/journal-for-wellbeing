<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep warm golden-dark -->
  <rect width="1200" height="628" fill="#1c1608"/>

  <!-- Radial warm glow -->
  <radialGradient id="gratGlow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#28200a" stop-opacity="1"/>
    <stop offset="100%" stop-color="#1c1608" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#gratGlow)"/>

  <!-- Constellation of dots representing specific gratitudes -->
  <!-- Each star is connected by thin lines to nearby stars — a constellation pattern -->
  <g opacity="0.35" stroke="#d4a840" stroke-width="0.8">
    <line x1="180" y1="140" x2="260" y2="200"/>
    <line x1="260" y1="200" x2="340" y2="155"/>
    <line x1="340" y1="155" x2="430" y2="220"/>
    <line x1="430" y1="220" x2="520" y2="175"/>
    <line x1="520" y1="175" x2="600" y2="220"/>
    <line x1="600" y1="220" x2="700" y2="170"/>
    <line x1="700" y1="170" x2="800" y2="215"/>
    <line x1="800" y1="215" x2="900" y2="160"/>
    <line x1="900" y1="160" x2="1000" y2="200"/>
    <line x1="260" y1="200" x2="310" y2="290"/>
    <line x1="430" y1="220" x2="400" y2="320"/>
    <line x1="600" y1="220" x2="620" y2="350"/>
    <line x1="800" y1="215" x2="820" y2="320"/>
    <!-- lower constellation -->
    <line x1="310" y1="290" x2="400" y2="320"/>
    <line x1="400" y1="320" x2="510" y2="365"/>
    <line x1="510" y1="365" x2="620" y2="350"/>
    <line x1="620" y1="350" x2="720" y2="400"/>
    <line x1="820" y1="320" x2="720" y2="400"/>
  </g>

  <!-- Stars (dots of varying brightness) -->
  <g fill="#e8c060">
    <circle cx="180" cy="140" r="4" opacity="0.8"/>
    <circle cx="260" cy="200" r="5.5" opacity="0.9"/>
    <circle cx="340" cy="155" r="3.5" opacity="0.7"/>
    <circle cx="430" cy="220" r="5" opacity="0.85"/>
    <circle cx="520" cy="175" r="3" opacity="0.65"/>
    <circle cx="600" cy="220" r="6" opacity="0.9"/>
    <circle cx="700" cy="170" r="3.5" opacity="0.7"/>
    <circle cx="800" cy="215" r="5" opacity="0.8"/>
    <circle cx="900" cy="160" r="3" opacity="0.6"/>
    <circle cx="1000" cy="200" r="4" opacity="0.75"/>
    <circle cx="310" cy="290" r="3.5" opacity="0.65"/>
    <circle cx="400" cy="320" r="4.5" opacity="0.75"/>
    <circle cx="510" cy="365" r="3" opacity="0.6"/>
    <circle cx="620" cy="350" r="5" opacity="0.8"/>
    <circle cx="720" cy="400" r="4" opacity="0.7"/>
    <circle cx="820" cy="320" r="3.5" opacity="0.65"/>
    <!-- extra isolated stars -->
    <circle cx="100" cy="310" r="2" opacity="0.4"/>
    <circle cx="1100" cy="280" r="2.5" opacity="0.45"/>
    <circle cx="1050" cy="120" r="3" opacity="0.5"/>
    <circle cx="150" cy="500" r="2" opacity="0.35"/>
  </g>

  <!-- Text backdrop -->
  <rect x="0" y="190" width="1200" height="240" fill="#1c1608" opacity="0.6"/>

  <!-- Category -->
  <text x="600" y="225" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#c8a040" text-anchor="middle" letter-spacing="5">PRACTICE · WELLBEING</text>

  <!-- Title -->
  <text x="600" y="295" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="normal" fill="#f8f0d8" text-anchor="middle">Gratitude Journal Ideas</text>

  <!-- Subtitle -->
  <text x="600" y="345" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#c8a040" text-anchor="middle" font-style="italic">Beyond the Obvious Three-Things List</text>

  <!-- Divider -->
  <line x1="450" y1="374" x2="576" y2="374" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="600" cy="374" r="3.5" fill="#c8a040"/>
  <line x1="624" y1="374" x2="750" y2="374" stroke="#3a2c08" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="418" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#221a04" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
