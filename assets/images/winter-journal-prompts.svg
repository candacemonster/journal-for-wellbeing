<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep blue-grey winter night -->
  <rect width="1200" height="628" fill="#161e28"/>

  <!-- Snow particles — scattered dots of varying size -->
  <circle cx="98" cy="55" r="2.5" fill="#e8f0f8" opacity="0.5"/>
  <circle cx="205" cy="88" r="1.5" fill="#e8f0f8" opacity="0.4"/>
  <circle cx="344" cy="42" r="2" fill="#e8f0f8" opacity="0.45"/>
  <circle cx="468" cy="100" r="1.5" fill="#e8f0f8" opacity="0.35"/>
  <circle cx="590" cy="60" r="2" fill="#e8f0f8" opacity="0.5"/>
  <circle cx="712" cy="95" r="1.5" fill="#e8f0f8" opacity="0.4"/>
  <circle cx="834" cy="50" r="2" fill="#e8f0f8" opacity="0.45"/>
  <circle cx="958" cy="80" r="1.5" fill="#e8f0f8" opacity="0.4"/>
  <circle cx="1082" cy="62" r="2" fill="#e8f0f8" opacity="0.5"/>
  <circle cx="155" cy="520" r="2" fill="#e8f0f8" opacity="0.3"/>
  <circle cx="380" cy="560" r="1.5" fill="#e8f0f8" opacity="0.25"/>
  <circle cx="640" cy="580" r="2" fill="#e8f0f8" opacity="0.3"/>
  <circle cx="890" cy="545" r="1.5" fill="#e8f0f8" opacity="0.28"/>
  <circle cx="1120" cy="570" r="2" fill="#e8f0f8" opacity="0.3"/>
  <!-- Mid-layer snow -->
  <circle cx="66" cy="295" r="2" fill="#e8f0f8" opacity="0.25"/>
  <circle cx="258" cy="240" r="1.5" fill="#e8f0f8" opacity="0.2"/>
  <circle cx="1044" cy="310" r="2" fill="#e8f0f8" opacity="0.2"/>

  <!-- Bare winter tree silhouette (left side) -->
  <!-- Trunk -->
  <line x1="100" y1="628" x2="100" y2="440" stroke="#2a3848" stroke-width="8" stroke-linecap="round"/>
  <!-- Main branches -->
  <line x1="100" y1="490" x2="55" y2="380" stroke="#2a3848" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="470" x2="148" y2="360" stroke="#2a3848" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="450" x2="70" y2="300" stroke="#263240" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="445" x2="132" y2="295" stroke="#263240" stroke-width="3" stroke-linecap="round"/>
  <!-- Small branches -->
  <line x1="70" y1="300" x2="44" y2="240" stroke="#22303e" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="300" x2="88" y2="240" stroke="#22303e" stroke-width="2" stroke-linecap="round"/>
  <line x1="132" y1="295" x2="108" y2="240" stroke="#22303e" stroke-width="2" stroke-linecap="round"/>
  <line x1="132" y1="295" x2="152" y2="240" stroke="#22303e" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="380" x2="28" y2="320" stroke="#22303e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="148" y1="360" x2="172" y2="300" stroke="#22303e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right tree (mirrored, lighter) -->
  <line x1="1100" y1="628" x2="1100" y2="460" stroke="#1e2e3e" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="1100" y1="510" x2="1055" y2="400" stroke="#1e2e3e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="1100" y1="490" x2="1142" y2="380" stroke="#1e2e3e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="1055" y1="400" x2="1028" y2="340" stroke="#1e2e3e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="1142" y1="380" x2="1162" y2="320" stroke="#1e2e3e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Snow ground line -->
  <path d="M0,590 Q200,575 400,585 Q600,590 800,578 Q1000,568 1200,580 L1200,628 L0,628 Z" fill="#e8f0f8" opacity="0.06"/>

  <!-- Glow behind title -->
  <ellipse cx="600" cy="285" rx="480" ry="115" fill="#101820" opacity="0.75"/>

  <!-- Category -->
  <text x="600" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#8ab0d8" text-anchor="middle" letter-spacing="5">PROMPTS · SEASONAL</text>

  <!-- Title -->
  <text x="600" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="normal" fill="#ece8f8" text-anchor="middle">Winter Journal Prompts</text>

  <!-- Subtitle -->
  <text x="600" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="23" fill="#8ab0d8" text-anchor="middle" font-style="italic">20 Gentle Prompts for the Quiet Season</text>

  <!-- Divider with snowflake dot -->
  <line x1="440" y1="358" x2="572" y2="358" stroke="#4a6888" stroke-width="0.8"/>
  <circle cx="600" cy="358" r="3.5" fill="#8ab0d8"/>
  <line x1="628" y1="358" x2="760" y2="358" stroke="#4a6888" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="402" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#304858" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
