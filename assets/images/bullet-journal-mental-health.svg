  <!-- Background: deep teal-black, calm and structured -->
  <rect width="1200" height="628" fill="#0f1e20"/>

  <!-- Grid of tiny dots (dot-grid notebook paper) — left panel -->
  <g opacity="0.12" fill="#7ac8c0">
    <!-- Row 1 -->
    <circle cx="60" cy="80" r="1.2"/><circle cx="84" cy="80" r="1.2"/><circle cx="108" cy="80" r="1.2"/><circle cx="132" cy="80" r="1.2"/><circle cx="156" cy="80" r="1.2"/><circle cx="180" cy="80" r="1.2"/><circle cx="204" cy="80" r="1.2"/><circle cx="228" cy="80" r="1.2"/>
    <circle cx="60" cy="104" r="1.2"/><circle cx="84" cy="104" r="1.2"/><circle cx="108" cy="104" r="1.2"/><circle cx="132" cy="104" r="1.2"/><circle cx="156" cy="104" r="1.2"/><circle cx="180" cy="104" r="1.2"/><circle cx="204" cy="104" r="1.2"/><circle cx="228" cy="104" r="1.2"/>
    <circle cx="60" cy="128" r="1.2"/><circle cx="84" cy="128" r="1.2"/><circle cx="108" cy="128" r="1.2"/><circle cx="132" cy="128" r="1.2"/><circle cx="156" cy="128" r="1.2"/><circle cx="180" cy="128" r="1.2"/><circle cx="204" cy="128" r="1.2"/><circle cx="228" cy="128" r="1.2"/>
    <circle cx="60" cy="152" r="1.2"/><circle cx="84" cy="152" r="1.2"/><circle cx="108" cy="152" r="1.2"/><circle cx="132" cy="152" r="1.2"/><circle cx="156" cy="152" r="1.2"/><circle cx="180" cy="152" r="1.2"/><circle cx="204" cy="152" r="1.2"/><circle cx="228" cy="152" r="1.2"/>
    <circle cx="60" cy="176" r="1.2"/><circle cx="84" cy="176" r="1.2"/><circle cx="108" cy="176" r="1.2"/><circle cx="132" cy="176" r="1.2"/><circle cx="156" cy="176" r="1.2"/><circle cx="180" cy="176" r="1.2"/><circle cx="204" cy="176" r="1.2"/><circle cx="228" cy="176" r="1.2"/>
    <circle cx="60" cy="200" r="1.2"/><circle cx="84" cy="200" r="1.2"/><circle cx="108" cy="200" r="1.2"/><circle cx="132" cy="200" r="1.2"/><circle cx="156" cy="200" r="1.2"/><circle cx="180" cy="200" r="1.2"/><circle cx="204" cy="200" r="1.2"/><circle cx="228" cy="200" r="1.2"/>
    <!-- more rows -->
    <circle cx="60" cy="224" r="1.2"/><circle cx="84" cy="224" r="1.2"/><circle cx="108" cy="224" r="1.2"/><circle cx="132" cy="224" r="1.2"/><circle cx="156" cy="224" r="1.2"/><circle cx="180" cy="224" r="1.2"/><circle cx="204" cy="224" r="1.2"/><circle cx="228" cy="224" r="1.2"/>
    <circle cx="60" cy="248" r="1.2"/><circle cx="84" cy="248" r="1.2"/><circle cx="108" cy="248" r="1.2"/><circle cx="132" cy="248" r="1.2"/><circle cx="156" cy="248" r="1.2"/><circle cx="180" cy="248" r="1.2"/><circle cx="204" cy="248" r="1.2"/><circle cx="228" cy="248" r="1.2"/>
    <circle cx="60" cy="272" r="1.2"/><circle cx="84" cy="272" r="1.2"/><circle cx="108" cy="272" r="1.2"/><circle cx="132" cy="272" r="1.2"/><circle cx="156" cy="272" r="1.2"/><circle cx="180" cy="272" r="1.2"/><circle cx="204" cy="272" r="1.2"/><circle cx="228" cy="272" r="1.2"/>
    <circle cx="60" cy="296" r="1.2"/><circle cx="84" cy="296" r="1.2"/><circle cx="108" cy="296" r="1.2"/><circle cx="132" cy="296" r="1.2"/><circle cx="156" cy="296" r="1.2"/><circle cx="180" cy="296" r="1.2"/><circle cx="204" cy="296" r="1.2"/><circle cx="228" cy="296" r="1.2"/>
    <circle cx="60" cy="320" r="1.2"/><circle cx="84" cy="320" r="1.2"/><circle cx="108" cy="320" r="1.2"/><circle cx="132" cy="320" r="1.2"/><circle cx="156" cy="320" r="1.2"/><circle cx="180" cy="320" r="1.2"/><circle cx="204" cy="320" r="1.2"/><circle cx="228" cy="320" r="1.2"/>
    <circle cx="60" cy="344" r="1.2"/><circle cx="84" cy="344" r="1.2"/><circle cx="108" cy="344" r="1.2"/><circle cx="132" cy="344" r="1.2"/><circle cx="156" cy="344" r="1.2"/><circle cx="180" cy="344" r="1.2"/><circle cx="204" cy="344" r="1.2"/><circle cx="228" cy="344" r="1.2"/>
