  <!-- Mood tracker mini-chart — right side, abstract coloured grid -->
  <g transform="translate(960,90)" opacity="0.35">
    <!-- Week grid: 7 cols × 4 rows, each box 28×18 -->
    <!-- Row 1 — warm/okay -->
    <rect x="0" y="0" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="28" y="0" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="56" y="0" width="24" height="14" rx="2" fill="#8095b0"/>
    <rect x="84" y="0" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="112" y="0" width="24" height="14" rx="2" fill="#a8c888"/>
    <rect x="140" y="0" width="24" height="14" rx="2" fill="#a8c888"/>
    <rect x="168" y="0" width="24" height="14" rx="2" fill="#8095b0"/>
    <!-- Row 2 -->
    <rect x="0" y="18" width="24" height="14" rx="2" fill="#a0a8c0"/>
    <rect x="28" y="18" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="56" y="18" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="84" y="18" width="24" height="14" rx="2" fill="#c8b870"/>
    <rect x="112" y="18" width="24" height="14" rx="2" fill="#a8c888"/>
    <rect x="140" y="18" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="168" y="18" width="24" height="14" rx="2" fill="#a8c888"/>
    <!-- Row 3 -->
    <rect x="0" y="36" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="28" y="36" width="24" height="14" rx="2" fill="#8095b0"/>
    <rect x="56" y="36" width="24" height="14" rx="2" fill="#a0a8c0"/>
    <rect x="84" y="36" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="112" y="36" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="140" y="36" width="24" height="14" rx="2" fill="#c8b870"/>
    <rect x="168" y="36" width="24" height="14" rx="2" fill="#a8c888"/>
    <!-- Row 4 -->
    <rect x="0" y="54" width="24" height="14" rx="2" fill="#a8c888"/>
    <rect x="28" y="54" width="24" height="14" rx="2" fill="#a8c888"/>
    <rect x="56" y="54" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="84" y="54" width="24" height="14" rx="2" fill="#a8c888"/>
    <rect x="112" y="54" width="24" height="14" rx="2" fill="#8095b0"/>
    <rect x="140" y="54" width="24" height="14" rx="2" fill="#6ab8a8"/>
    <rect x="168" y="54" width="24" height="14" rx="2" fill="#a8c888"/>
    <!-- Label -->
    <text x="96" y="86" font-family="Georgia, serif" font-size="11" fill="#4a8880" text-anchor="middle" letter-spacing="2">MOOD LOG</text>
  </g>

  <!-- Small bullet marks on left grid -->
  <g opacity="0.28" fill="#7ac8c0">
    <rect x="72" y="430" width="8" height="8" rx="1"/>
    <rect x="72" y="450" width="8" height="8" rx="1"/>
    <rect x="72" y="470" width="8" height="8" rx="1"/>
    <rect x="72" y="490" width="8" height="8" rx="1"/>
    <rect x="72" y="510" width="8" height="8" rx="1"/>
    <line x1="86" y1="434" x2="150" y2="434" stroke="#7ac8c0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="86" y1="454" x2="180" y2="454" stroke="#7ac8c0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="86" y1="474" x2="140" y2="474" stroke="#7ac8c0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="86" y1="494" x2="160" y2="494" stroke="#7ac8c0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="86" y1="514" x2="130" y2="514" stroke="#7ac8c0" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Dark text backdrop -->
  <rect x="0" y="220" width="1200" height="200" fill="#0f1e20" opacity="0.6"/>

  <!-- Category -->
  <text x="600" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#60a898" text-anchor="middle" letter-spacing="5">PRACTICE · MENTAL HEALTH</text>

  <!-- Title -->
  <text x="600" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="normal" fill="#e0f4f0" text-anchor="middle">Bullet Journal for Mental Health</text>

  <!-- Subtitle -->
  <text x="600" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#60a898" text-anchor="middle" font-style="italic">A Gentler Approach to Tracking Your Inner Life</text>

  <!-- Divider -->
  <line x1="450" y1="396" x2="576" y2="396" stroke="#1a3a38" stroke-width="0.8"/>
  <circle cx="600" cy="396" r="3.5" fill="#60a898"/>
  <line x1="624" y1="396" x2="750" y2="396" stroke="#1a3a38" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="440" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#162828" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
