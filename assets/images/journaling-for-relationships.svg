<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep dusty rose-plum -->
  <rect width="1200" height="628" fill="#1e1620"/>

  <!-- Subtle warm radial glow, centre -->
  <radialGradient id="warmGlow" cx="50%" cy="52%" r="50%">
    <stop offset="0%" stop-color="#2e1e28" stop-opacity="1"/>
    <stop offset="100%" stop-color="#1e1620" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#warmGlow)"/>

  <!-- Interlinked rings motif — left of centre, abstract connection symbol -->
  <!-- Ring 1 -->
  <circle cx="448" cy="314" r="78" stroke="#7a4868" stroke-width="2" fill="none" opacity="0.45"/>
  <!-- Ring 2 (overlapping, offset right) -->
  <circle cx="528" cy="314" r="78" stroke="#7a4868" stroke-width="2" fill="none" opacity="0.45"/>
  <!-- Fill/overlap arc of ring 2 inside ring 1 — masked by clipping — simplified as inner glow -->
  <circle cx="488" cy="314" r="28" fill="#7a4868" opacity="0.06"/>

  <!-- Botanical accent — right side, soft stems -->
  <g opacity="0.18" transform="translate(1010,150)">
    <!-- Main stem -->
    <path d="M30,420 Q28,300 40,200 Q52,100 45,20" stroke="#c89ab0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M42,150 Q80,130 95,100 Q65,115 43,135" stroke="#c89ab0" stroke-width="1.2" fill="#c89ab0" opacity="0.3"/>
    <path d="M44,220 Q10,200 0,168 Q28,188 44,210" stroke="#c89ab0" stroke-width="1.2" fill="#c89ab0" opacity="0.25"/>
    <path d="M39,310 Q75,295 88,265 Q62,282 40,298" stroke="#c89ab0" stroke-width="1.2" fill="#c89ab0" opacity="0.28"/>
    <path d="M38,370 Q5,355 −4,325 Q22,342 37,358" stroke="#c89ab0" stroke-width="1.2" fill="#c89ab0" opacity="0.25"/>
  </g>

  <!-- Mirror botanical — left side -->
  <g opacity="0.13" transform="translate(155,160)">
    <path d="M30,400 Q28,290 36,185 Q44,80 40,15" stroke="#c89ab0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M38,145 Q0,125 -12,98 Q18,112 37,132" stroke="#c89ab0" stroke-width="1" fill="#c89ab0" opacity="0.3"/>
    <path d="M37,255 Q72,238 84,208 Q58,224 37,242" stroke="#c89ab0" stroke-width="1" fill="#c89ab0" opacity="0.25"/>
  </g>

  <!-- Two small connected line-paths suggesting threads or letters -->
  <g opacity="0.12" transform="translate(560,180)">
    <path d="M0,0 Q20,15 40,0 Q60,−15 80,0" stroke="#d8b0c8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M0,20 Q20,35 40,20 Q60,5 80,20" stroke="#d8b0c8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Dark text backdrop -->
  <rect x="0" y="210" width="1200" height="220" fill="#1e1620" opacity="0.55"/>

  <!-- Category -->
  <text x="600" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#b888a8" text-anchor="middle" letter-spacing="5">PRACTICE · WELLBEING</text>

  <!-- Title -->
  <text x="600" y="315" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="normal" fill="#f0e8f0" text-anchor="middle">Journaling for Relationships</text>

  <!-- Subtitle -->
  <text x="600" y="365" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#b888a8" text-anchor="middle" font-style="italic">Writing Through Connection, Conflict, and Love</text>

  <!-- Divider -->
  <line x1="450" y1="392" x2="576" y2="392" stroke="#4a2c40" stroke-width="0.8"/>
  <circle cx="600" cy="392" r="3.5" fill="#b888a8"/>
  <line x1="624" y1="392" x2="750" y2="392" stroke="#4a2c40" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="436" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#32182a" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
