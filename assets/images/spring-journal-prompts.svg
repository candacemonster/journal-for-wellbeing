<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep rich forest green -->
  <rect width="1200" height="628" fill="#0e1e12"/>

  <!-- Soft radial glow -->
  <radialGradient id="springGlow" cx="50%" cy="52%" r="50%">
    <stop offset="0%" stop-color="#152a18" stop-opacity="1"/>
    <stop offset="100%" stop-color="#0e1e12" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#springGlow)"/>

  <!-- Spring botanical — left panel: fresh stems and buds -->
  <g opacity="0.28" transform="translate(108,60)">
    <!-- Main stem -->
    <path d="M60,540 Q58,420 62,300 Q66,180 58,60 Q54,10 60,0" stroke="#7ac878" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Leaves springing out -->
    <path d="M61,120 Q110,95 128,65 Q98,88 61,108" fill="#7ac878" opacity="0.5"/>
    <path d="M62,200 Q14,178 4,148 Q34,170 62,190" fill="#7ac878" opacity="0.45"/>
    <path d="M62,300 Q115,278 130,248 Q100,270 63,290" fill="#7ac878" opacity="0.5"/>
    <path d="M63,380 Q18,360 8,332 Q36,354 63,372" fill="#7ac878" opacity="0.4"/>
    <path d="M62,460 Q108,440 122,412 Q92,432 62,452" fill="#7ac878" opacity="0.38"/>
    <!-- buds at top -->
    <ellipse cx="58" cy="35" rx="7" ry="12" fill="#a8e898" opacity="0.6" transform="rotate(-10, 58, 35)"/>
    <ellipse cx="72" cy="20" rx="5" ry="9" fill="#a8e898" opacity="0.5" transform="rotate(15, 72, 20)"/>
  </g>

  <!-- Right botanical mirror -->
  <g opacity="0.2" transform="translate(1030, 100)">
    <path d="M30,480 Q28,370 32,260 Q36,150 30,50" stroke="#7ac878" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M31,140 Q68,120 78,95 Q54,112 31,132" fill="#7ac878" opacity="0.5"/>
    <path d="M32,260 Q-2,242 -8,218 Q18,236 32,252" fill="#7ac878" opacity="0.4"/>
    <path d="M31,370 Q66,352 74,328 Q52,346 31,362" fill="#7ac878" opacity="0.38"/>
    <ellipse cx="30" cy="30" rx="5" ry="9" fill="#a8e898" opacity="0.55" transform="rotate(-8, 30, 30)"/>
  </g>

  <!-- Small blossom dots scattered -->
  <g fill="#d0f0a8" opacity="0.25">
    <circle cx="350" cy="100" r="3"/>
    <circle cx="420" cy="140" r="2.5"/>
    <circle cx="510" cy="90" r="3.5"/>
    <circle cx="680" cy="120" r="2.5"/>
    <circle cx="780" cy="85" r="3"/>
    <circle cx="870" cy="130" r="2.5"/>
    <circle cx="400" cy="540" r="2.5"/>
    <circle cx="700" cy="555" r="3"/>
    <circle cx="950" cy="520" r="2"/>
  </g>

  <!-- Text backdrop -->
  <rect x="0" y="215" width="1200" height="210" fill="#0e1e12" opacity="0.6"/>

  <!-- Category -->
  <text x="600" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#70c860" text-anchor="middle" letter-spacing="5">PROMPTS · SEASONAL</text>

  <!-- Title -->
  <text x="600" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="normal" fill="#e8f8e8" text-anchor="middle">Spring Journal Prompts</text>

  <!-- Subtitle -->
  <text x="600" y="366" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#70c860" text-anchor="middle" font-style="italic">20 Prompts for the Season of Beginning Again</text>

  <!-- Divider -->
  <line x1="450" y1="394" x2="576" y2="394" stroke="#1a3820" stroke-width="0.8"/>
  <circle cx="600" cy="394" r="3.5" fill="#70c860"/>
  <line x1="624" y1="394" x2="750" y2="394" stroke="#1a3820" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="438" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#102010" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
