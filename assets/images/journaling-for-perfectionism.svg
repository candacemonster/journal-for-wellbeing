<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep slate-grey, composed feel -->
  <rect width="1200" height="628" fill="#181c20"/>

  <!-- Grid lines — perfectionist graph paper feel, very faint -->
  <g opacity="0.05" stroke="#d0c8b8" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="628"/>
    <line x1="160" y1="0" x2="160" y2="628"/>
    <line x1="240" y1="0" x2="240" y2="628"/>
    <line x1="320" y1="0" x2="320" y2="628"/>
    <line x1="400" y1="0" x2="400" y2="628"/>
    <line x1="480" y1="0" x2="480" y2="628"/>
    <line x1="560" y1="0" x2="560" y2="628"/>
    <line x1="640" y1="0" x2="640" y2="628"/>
    <line x1="720" y1="0" x2="720" y2="628"/>
    <line x1="800" y1="0" x2="800" y2="628"/>
    <line x1="880" y1="0" x2="880" y2="628"/>
    <line x1="960" y1="0" x2="960" y2="628"/>
    <line x1="1040" y1="0" x2="1040" y2="628"/>
    <line x1="1120" y1="0" x2="1120" y2="628"/>
  </g>

  <!-- Left side: crossed-out mark (representing the discarded perfect version) -->
  <g transform="translate(148,265)" opacity="0.2">
    <!-- A tight, neat "perfect" circle, grey, crossed out -->
    <circle cx="0" cy="0" r="52" stroke="#a0a8b8" stroke-width="2" fill="none"/>
    <line x1="-38" y1="-38" x2="38" y2="38" stroke="#b08080" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="38" y1="-38" x2="-38" y2="38" stroke="#b08080" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Right side: imperfect, loose spiral — accepted, uncrossed -->
  <g transform="translate(1048,265)" opacity="0.25">
    <path d="M0,-48 Q52,-48 52,0 Q52,52 0,52 Q-56,52 -56,-4 Q-56,-60 4,-60 Q62,-60 62,4 Q62,70 -4,70" fill="none" stroke="#d0c090" stroke-width="2" stroke-linecap="round"/>
    <!-- small star dot in centre -->
    <circle cx="0" cy="0" r="3" fill="#d0c090" opacity="0.6"/>
  </g>

  <!-- Arrow between them (subtle) -->
  <line x1="230" y1="314" x2="970" y2="314" stroke="#4a5060" stroke-width="0.8" stroke-dasharray="6,6" opacity="0.3"/>
  <polygon points="970,310 982,314 970,318" fill="#4a5060" opacity="0.3"/>

  <!-- Text backdrop -->
  <rect x="0" y="210" width="1200" height="220" fill="#181c20" opacity="0.65"/>

  <!-- Category -->
  <text x="600" y="247" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#8898a8" text-anchor="middle" letter-spacing="5">WELLBEING · MENTAL HEALTH</text>

  <!-- Title -->
  <text x="600" y="314" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="normal" fill="#e8e4f0" text-anchor="middle">Journaling for Perfectionism</text>

  <!-- Subtitle -->
  <text x="600" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#8898a8" text-anchor="middle" font-style="italic">Writing Through the Inner Critic</text>

  <!-- Divider -->
  <line x1="450" y1="392" x2="576" y2="392" stroke="#2a3040" stroke-width="0.8"/>
  <circle cx="600" cy="392" r="3.5" fill="#8898a8"/>
  <line x1="624" y1="392" x2="750" y2="392" stroke="#2a3040" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="436" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#1e2428" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
