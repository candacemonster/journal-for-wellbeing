<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: warm linen / cream -->
  <rect width="1200" height="628" fill="#f5efe3"/>

  <!-- Stack of notebook spines (left side) — illustrative element -->
  <!-- Bottom book -->
  <rect x="68" y="380" width="110" height="180" rx="4" fill="#c5a87a"/>
  <rect x="68" y="380" width="12" height="180" rx="2" fill="#b0905e"/>
  <line x1="80" y1="390" x2="80" y2="550" stroke="#9a7a48" stroke-width="1" opacity="0.4"/>
  <!-- Middle book -->
  <rect x="72" y="260" width="102" height="130" rx="4" fill="#8a6e5c"/>
  <rect x="72" y="260" width="11" height="130" rx="2" fill="#6e5244"/>
  <!-- Top book -->
  <rect x="76" y="190" width="94" height="78" rx="4" fill="#6b8a78"/>
  <rect x="76" y="190" width="10" height="78" rx="2" fill="#527060"/>
  <!-- Tiny top book -->
  <rect x="80" y="158" width="86" height="38" rx="3" fill="#c0b090"/>
  <rect x="80" y="158" width="9" height="38" rx="2" fill="#a89070"/>

  <!-- Elastic closure suggestion on front book -->
  <line x1="178" y1="460" x2="210" y2="460" stroke="#7a5a3a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Journal open-page spread (main central element) -->
  <!-- Left page -->
  <rect x="240" y="180" width="310" height="300" rx="0" fill="#faf6ee" stroke="#e0d8c8" stroke-width="1"/>
  <!-- Right page -->
  <rect x="550" y="180" width="310" height="300" rx="0" fill="#fcf8f2" stroke="#e0d8c8" stroke-width="1"/>
  <!-- Spine shadow in middle -->
  <rect x="546" y="180" width="8" height="300" fill="#d8cfc0" opacity="0.5"/>
  <!-- Ruled lines on left page -->
  <line x1="268" y1="230" x2="532" y2="230" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="268" y1="256" x2="532" y2="256" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="268" y1="282" x2="532" y2="282" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="268" y1="308" x2="532" y2="308" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="268" y1="334" x2="532" y2="334" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="268" y1="360" x2="532" y2="360" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="268" y1="386" x2="532" y2="386" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="268" y1="412" x2="532" y2="412" stroke="#e4ddd0" stroke-width="1"/>
  <!-- Ruled lines on right page -->
  <line x1="568" y1="230" x2="832" y2="230" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="568" y1="256" x2="832" y2="256" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="568" y1="282" x2="832" y2="282" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="568" y1="308" x2="832" y2="308" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="568" y1="334" x2="832" y2="334" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="568" y1="360" x2="832" y2="360" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="568" y1="386" x2="832" y2="386" stroke="#e4ddd0" stroke-width="1"/>
  <line x1="568" y1="412" x2="832" y2="412" stroke="#e4ddd0" stroke-width="1"/>

  <!-- Category label — placed on the upper journal area -->
  <text x="695" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#c5a87a" text-anchor="middle" letter-spacing="4">WELLBEING · GETTING STARTED</text>

  <!-- Main title across the journal spread -->
  <text x="695" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="normal" fill="#2c2416" text-anchor="middle">Best Journaling Notebooks</text>
  <text x="695" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="normal" fill="#2c2416" text-anchor="middle">for Mental Health</text>

  <!-- Subtitle -->
  <text x="695" y="386" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#8a6e5c" text-anchor="middle" font-style="italic">What to Look For and Why It Matters</text>

  <!-- Divider -->
  <line x1="570" y1="408" x2="680" y2="408" stroke="#c5a87a" stroke-width="0.8"/>
  <circle cx="695" cy="408" r="3" fill="#c5a87a"/>
  <line x1="710" y1="408" x2="820" y2="408" stroke="#c5a87a" stroke-width="0.8"/>

  <!-- Brand footer -->
  <text x="695" y="446" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#b09070" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
