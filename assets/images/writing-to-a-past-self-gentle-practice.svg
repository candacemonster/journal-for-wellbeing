<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <!-- Background: deep warm amber-brown -->
  <rect width="1200" height="628" fill="#1e1508"/>

  <!-- Warm radial glow -->
  <radialGradient id="pastGlow" cx="50%" cy="52%" r="50%">
    <stop offset="0%" stop-color="#2a1e0a" stop-opacity="1"/>
    <stop offset="100%" stop-color="#1e1508" stop-opacity="1"/>
  </radialGradient>
  <rect width="1200" height="628" fill="url(#pastGlow)"/>

  <!-- Past self page — slightly older, angled left, more faded -->
  <g transform="rotate(-6, 490, 314)" opacity="0.18">
    <rect x="310" y="120" width="360" height="430" rx="3" fill="#d8c8a8" stroke="#a08060" stroke-width="1"/>
    <!-- Lines on past page -->
    <line x1="328" y1="180" x2="650" y2="180" stroke="#a08060" stroke-width="0.8"/>
    <line x1="328" y1="204" x2="650" y2="204" stroke="#a08060" stroke-width="0.8"/>
    <line x1="328" y1="228" x2="620" y2="228" stroke="#a08060" stroke-width="0.8"/>
    <line x1="328" y1="252" x2="650" y2="252" stroke="#a08060" stroke-width="0.8"/>
    <line x1="328" y1="276" x2="640" y2="276" stroke="#a08060" stroke-width="0.8"/>
    <line x1="328" y1="300" x2="650" y2="300" stroke="#a08060" stroke-width="0.8"/>
    <line x1="328" y1="324" x2="600" y2="324" stroke="#a08060" stroke-width="0.8"/>
    <line x1="328" y1="348" x2="650" y2="348" stroke="#a08060" stroke-width="0.8"/>
    <!-- Date-like text stub at top -->
    <rect x="328" y="142" width="60" height="8" rx="2" fill="#a08060" opacity="0.4"/>
  </g>

  <!-- Present self page — cleaner, slightly taller, centred -->
  <g transform="rotate(3, 600, 310)" opacity="0.25">
    <rect x="370" y="100" width="360" height="440" rx="3" fill="#ece0c8" stroke="#b09070" stroke-width="1"/>
    <!-- Lines on present page -->
    <line x1="390" y1="160" x2="710" y2="160" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="184" x2="710" y2="184" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="208" x2="680" y2="208" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="232" x2="710" y2="232" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="256" x2="700" y2="256" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="280" x2="710" y2="280" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="304" x2="660" y2="304" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="328" x2="710" y2="328" stroke="#c0a880" stroke-width="0.8"/>
    <line x1="390" y1="352" x2="690" y2="352" stroke="#c0a880" stroke-width="0.8"/>
    <!-- Salutation line -->
    <rect x="390" y="138" width="120" height="9" rx="2" fill="#c0a880" opacity="0.5"/>
  </g>

  <!-- Botanical right edge -->
  <g opacity="0.15" transform="translate(1000, 80)">
    <path d="M40,500 Q38,385 42,270 Q46,155 40,50" stroke="#c8a860" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M41,170 Q80,150 90,124 Q64,142 41,162" fill="#c8a860" opacity="0.5"/>
    <path d="M42,290 Q4,272 -2,248 Q22,264 42,280" fill="#c8a860" opacity="0.45"/>
    <path d="M41,400 Q78,382 86,358 Q62,374 41,392" fill="#c8a860" opacity="0.4"/>
  </g>

  <!-- Text backdrop -->
  <rect x="0" y="218" width="1200" height="210" fill="#1e1508" opacity="0.65"/>

  <!-- Category -->
  <text x="600" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#c8983a" text-anchor="middle" letter-spacing="5">PRACTICE · SELF-COMPASSION</text>

  <!-- Title -->
  <text x="600" y="313" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="normal" fill="#f0e4cc" text-anchor="middle">Writing to a Past Self</text>

  <!-- Subtitle -->
  <text x="600" y="363" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#c8983a" text-anchor="middle" font-style="italic">A Step by Step Gentle Practice</text>

  <!-- Divider -->
  <line x1="450" y1="391" x2="576" y2="391" stroke="#2c1e0a" stroke-width="0.8"/>
  <circle cx="600" cy="391" r="3.5" fill="#c8983a"/>
  <line x1="624" y1="391" x2="750" y2="391" stroke="#2c1e0a" stroke-width="0.8"/>

  <!-- Brand -->
  <text x="600" y="435" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#201508" text-anchor="middle" letter-spacing="3">JOURNAL FOR WELLBEING</text>
</svg>
